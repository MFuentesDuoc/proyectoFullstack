spring.application.name=medico-service
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/db_hospital_medicos?rewriteBatchedStatements=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.generate_statistics=true

# ==========================================
# CONFIGURACIÓN DE SWAGGER / SPRINGDOC
# ==========================================
springdoc.api-docs.path=/v3/api-docs
# Opcional: Para que los endpoints se ordenen alfabéticamente por método (GET, POST, PUT, DELETE)
springdoc.swagger-ui.operationsSorter=method