spring.application.name=pacientes-service
server.port=8080

# CONFIGURACIÓN SWAGGER / OPENAPI (REVISADA)
# Esta es la ruta para el JSON (que ya te funciona)
springdoc.api-docs.path=/v3/api-docs
# Esta es la ruta para la interfaz visual
springdoc.swagger-ui.path=/swagger-ui.html
# Esto ayuda a que Swagger UI encuentre el JSON automáticamente
springdoc.swagger-ui.operationsSorter=alpha

# CONFIGURACIÓN BASE DE DATOS
spring.datasource.url=jdbc:mysql://localhost:3306/db_hospital_vm?rewriteBatchedStatements=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.generate_statistics=false

# FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.locations=classpath:db/migration